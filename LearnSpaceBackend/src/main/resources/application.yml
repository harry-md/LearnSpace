spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/learnspacedb
    username: root
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update 
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  servlet:
    multipart:
      max-file-size: 1024MB
      max-request-size: 1024MB
      file-size-threshold: 0MB