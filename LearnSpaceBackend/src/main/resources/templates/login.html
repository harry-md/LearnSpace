<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Learn Space</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        /* Tạo background gradient nhẹ nhàng cho trang đăng nhập */
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }

        .login-card {
            border-radius: 1rem;
            border: none;
        }

        .login-icon {
            font-size: 3rem;
            color: #0d6efd;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5 col-xl-4">

            <div class="card login-card shadow-lg">
                <div class="card-body p-5">

                    <div class="text-center mb-4">
                        <i class="fa-solid fa-graduation-cap login-icon mb-3"></i>
                        <h3 class="fw-bold text-dark">Learn Space</h3>
                        <p class="text-muted">Đăng nhập để tiếp tục</p>
                    </div>

                    <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center py-2" role="alert">
                        <i class="fa-solid fa-triangle-exclamation me-2"></i>
                        <small>Tài khoản hoặc mật khẩu không đúng!</small>
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center py-2"
                         role="alert">
                        <i class="fa-solid fa-circle-check me-2"></i>
                        <small>Bạn đã đăng xuất thành công.</small>
                    </div>

                    <form th:action="@{/login}" method="post">

                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="username" name="username"
                                   placeholder="name@example.com" required autofocus>
                            <label for="username"><i class="fa-solid fa-user me-2 text-muted"></i>Tên đăng nhập</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="Password" required>
                            <label for="password"><i class="fa-solid fa-lock me-2 text-muted"></i>Mật khẩu</label>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="remember-me" name="remember-me">
                                <label class="form-check-label text-muted small" for="remember-me">
                                    Ghi nhớ tôi
                                </label>
                            </div>
                            <a href="#" class="text-decoration-none small text-primary fw-medium">Quên mật khẩu?</a>
                        </div>

                        <button class="btn btn-primary w-100 py-2 mb-3 fw-bold shadow-sm" type="submit">
                            Đăng nhập <i class="fa-solid fa-arrow-right-to-bracket ms-1"></i>
                        </button>

                        <div class="text-center small text-muted">
                            Chưa có tài khoản? <a href="#" class="text-decoration-none fw-bold">Đăng ký ngay</a>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
