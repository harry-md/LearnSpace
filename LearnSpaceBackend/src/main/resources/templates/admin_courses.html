<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8">
    <title>Quản lý Khóa học - Learn Space</title>
    <th:block th:replace="~{base :: styles}"></th:block>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  </head>

  <body class="bg-light">
    <div class="container-fluid">
      <div class="row">

        <nav th:replace="~{base :: admin_sidebar('courses')}"></nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

          <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-3 mb-4 border-bottom">
            <h1 class="h3 fw-bold text-dark">Danh sách Khóa học</h1>
          </div>

          <div class="card shadow-sm border-0">
            <div class="card-body">

              <form th:action="@{/courses}" method="get" class="row mb-4 g-2">
                <div class="col-md-5">
                  <div class="input-group">
                    <span class="input-group-text bg-white"><i class="fa-solid fa-magnifying-glass"></i></span>
                    <input type="text" class="form-control" name="kw" placeholder="Tìm tên khóa học..." th:value="${param.kw}">
                  </div>
                </div>
                <div class="col-md-3">
                    <select class="form-select" name="categoryId">
                        <option value="">Tất cả danh mục</option>
                        
                        <option th:each="cat : ${categories}" 
                                th:value="${cat.id}" 
                                th:text="${cat.name}"
                                th:selected="${param.categoryId != null and param.categoryId[0] == cat.id.toString()}">
                            Tên danh mục
                        </option>
                        
                    </select>
                </div>
                <div class="col-md-2">
                  <button type="submit" class="btn btn-secondary w-100">Lọc dữ liệu</button>
                </div>
              </form>

              <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                  <thead class="table-light">
                    <tr>
                      <th>ID</th>
                      <th>Thông tin Khóa học</th>
                      <th>Danh mục</th>
                      <th>Giá</th>
                      <th>Trạng thái</th>
                      <th class="text-end"></th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr th:each="course : ${courses}">
                      <td class="text-muted fw-bold" th:text="${'#' + course.id}">#1</td>
                      <td>
                        <div class="d-flex align-items-center">
                          <img th:src="${course.image != null ? course.image : 'https://placehold.co/60x40?text=No+Image'}"
                            alt="Course Image" class="rounded me-3 border" width="60" height="40"
                            style="object-fit: cover;">
                          <div>
                            <div class="fw-bold text-dark" th:text="${course.name}">Lập trình Java
                              Spring Boot
                            </div>
                          </div>
                        </div>
                      </td>
                      <td th:text="${course.categoryName}">Công nghệ thông tin</td>
                      <td class="fw-semibold text-success"
                        th:text="${#numbers.formatDecimal(course.price, 0, 'COMMA', 0, 'POINT')} + 'VNĐ'">
                        1,500,000 đ
                      </td>
                      <td>
                        <span class="badge bg-success bg-opacity-10 text-success border border-success"
                          th:if="${course.active}">Đang mở</span>
                        <span class="badge bg-danger bg-opacity-10 text-danger border border-danger"
                          th:unless="${course.active}">Đã đóng</span>
                      </td>
                      <td class="text-end">
                        <div class="btn-group shadow-sm">
                          <a th:href="@{'/courses/delete' + ${course.id}}"
                            class="btn btn-sm btn-light text-danger"
                            onclick="return confirm('Bạn có chắc chắn muốn xóa khóa học này?');"
                            data-bs-toggle="tooltip" title="Xóa">
                            <i class="fa-solid fa-trash-can"></i>
                          </a>
                        </div>
                      </td>
                    </tr>

                    <tr th:if="${courses == null or courses.empty}">
                      <td class="text-muted">#2</td>
                      <td>
                        <div class="d-flex align-items-center">
                          <img src="https://placehold.co/60x40/0D8ABC/FFFFFF?text=Python"
                            alt="Course Image" class="rounded me-3 border" width="60" height="40"
                            style="object-fit: cover;">
                          <div>
                            <div class="fw-bold text-dark">Lập trình Python từ Zero đến Hero</div>
                          </div>
                        </div>
                      </td>
                      <td>Khoa học dữ liệu</td>
                      <td class="fw-semibold text-success">850,000 đ</td>
                      <td><span class="badge bg-success bg-opacity-10 text-success border border-success">Đang mở</span>
                      </td>
                      <td class="text-end">
                        <div class="btn-group shadow-sm">
                          <button class="btn btn-sm btn-light text-primary"><i
                            class="fa-solid fa-list-ol"></i></button>
                          <button class="btn btn-sm btn-light text-warning"><i
                            class="fa-solid fa-pen-to-square"></i></button>
                          <button class="btn btn-sm btn-light text-danger"><i
                            class="fa-solid fa-trash-can"></i></button>
                        </div>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>

            </div>

            <div class="card-footer bg-white border-top-0 py-3" th:if="${totalPages > 0}">
              <nav aria-label="Page navigation">
                <ul class="pagination justify-content-end mb-0">
                  <li class="page-item" th:classappend="${currentPage == 1} ? 'disabled'">
                    <a class="page-link" th:href="@{/courses(page=${currentPage - 1}, kw=${param.kw}, categoryId=${param.categoryId}, active=${param.active})}">
                      Trang trước
                    </a>
                  </li>

                  <li class="page-item" th:each="i : ${#numbers.sequence(1, totalPages)}" th:classappend="${currentPage == i} ? 'active'">
                    <a class="page-link" th:href="@{/courses(page=${i}, kw=${param.kw}, categoryId=${param.categoryId}, active=${param.active})}" th:text="${i}">
                      1
                    </a>
                  </li>

                  <li class="page-item" th:classappend="${currentPage == totalPages} ? 'disabled'">
                    <a class="page-link" th:href="@{/courses(page=${currentPage + 1}, kw=${param.kw}, categoryId=${param.categoryId}, active=${param.active})}">
                      Trang sau
                    </a>
                  </li>
                </ul>
              </nav>
            </div>

        </main>
      </div>
    </div>

    <footer th:replace="~{base :: footer}"></footer>

  </body>
</html>
