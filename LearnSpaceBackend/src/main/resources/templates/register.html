<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Learn Space</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        /* Giữ nguyên background gradient đồng bộ với trang đăng nhập */
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }

        .login-card {
            border-radius: 1rem;
            border: none;
        }

        .login-icon {
            font-size: 3rem;
            color: #0d6efd;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6 col-xl-5">

            <div class="card login-card shadow-lg">
                <div class="card-body p-5">

                    <div class="text-center mb-4">
                        <i class="fa-solid fa-user-plus login-icon mb-3"></i>
                        <h3 class="fw-bold text-dark">Learn Space</h3>
                        <p class="text-muted">Tạo tài khoản mới</p>
                    </div>

                    <div th:if="${error}" class="alert alert-danger d-flex align-items-center py-2" role="alert">
                        <i class="fa-solid fa-triangle-exclamation me-2"></i>
                        <small th:text="${error}">Thông tin đăng ký không hợp lệ!</small>
                    </div>

                    <div th:if="${success}" class="alert alert-success d-flex align-items-center py-2" role="alert">
                        <i class="fa-solid fa-circle-check me-2"></i>
                        <small th:text="${success}">Đăng ký thành công!</small>
                    </div>

                    <form th:action="@{/register}" method="post">

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="lastName" name="lastName"
                                           placeholder="Nguyễn Văn" required autofocus>
                                    <label for="lastName"><i class="fa-solid fa-user-tag me-2 text-muted"></i>Họ</label>
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="firstName" name="firstName"
                                           placeholder="A" required>
                                    <label for="firstName"><i class="fa-solid fa-user me-2 text-muted"></i>Tên</label>
                                </div>
                            </div>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="username" name="username"
                                   placeholder="nguyenvana123" required>
                            <label for="username"><i class="fa-solid fa-id-badge me-2 text-muted"></i>Tên đăng
                                nhập</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="email" name="email"
                                   placeholder="name@example.com" required>
                            <label for="email"><i class="fa-solid fa-envelope me-2 text-muted"></i>Địa chỉ Email</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="password" name="password"
                                   placeholder="Password" required>
                            <label for="password"><i class="fa-solid fa-lock me-2 text-muted"></i>Mật khẩu</label>
                        </div>

                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" id="terms" name="terms" required>
                            <label class="form-check-label text-muted small" for="terms">
                                Tôi đồng ý với các <a href="#" class="text-decoration-none text-primary fw-medium">Điều
                                khoản dịch vụ</a> và <a href="#" class="text-decoration-none text-primary fw-medium">Chính
                                sách bảo mật</a>
                            </label>
                        </div>

                        <button class="btn btn-primary w-100 py-2 mb-3 fw-bold shadow-sm" type="submit">
                            Đăng ký tài khoản <i class="fa-solid fa-user-check ms-1"></i>
                        </button>

                        <div class="text-center small text-muted">
                            Đã có tài khoản? <a th:href="@{/login}" class="text-decoration-none fw-bold">Đăng nhập
                            ngay</a>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
