<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8">
    <title>Quản lý Người dùng - Learn Space</title>
    <th:block th:replace="~{base :: styles}"></th:block>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  </head>

  <body class="bg-light">

    <div class="container-fluid">
      <div class="row">

        <nav th:replace="~{base :: admin_sidebar('users')}"></nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

          <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pb-3 mb-4 border-bottom">
            <h1 class="h3 fw-bold text-dark">Danh sách Người dùng</h1>
          </div>

          <div class="card shadow-sm border-0">
            <div class="card-body">
              <form th:action="@{/users}" method="get" class="row mb-4 g-2">
                <div class="col-md-4">
                  <div class="input-group">
                    <span class="input-group-text bg-white"><i class="fa-solid fa-magnifying-glass"></i></span>
                    <input type="text" class="form-control" name="kw" placeholder="Tìm tên, email hoặc username..." th:value="${param.kw}">
                  </div>
                </div>
                <div class="col-md-3">
                  <select class="form-select" name="role">
                    <option value="">Tất cả vai trò</option>
                    <option value="ADMIN" th:selected="${param.role != null and param.role[0] == 'ADMIN'}">Admin</option>
                    <option value="STUDENT" th:selected="${param.role != null and param.role[0] == 'STUDENT'}">Học viên</option>
                    <option value="TEACHER" th:selected="${param.role != null and param.role[0] == 'TEACHER'}">Giảng viên</option>
                  </select>
                </div>
                <div class="col-md-3">
                  <select class="form-select" name="active">
                    <option value="">Tất cả trạng thái</option>
                    <option value="1" th:selected="${param.active != null and param.active[0] == '1'}">Đang hoạt động</option>
                    <option value="0" th:selected="${param.active != null and param.active[0] == '0'}">Bị khóa</option>
                  </select>
                </div>
                <div class="col-md-2">
                  <button type="submit" class="btn btn-secondary w-100">Lọc dữ liệu</button>
                </div>
              </form>

              <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                  <thead class="table-light">
                    <tr>
                      <th>ID</th>
                      <th>Người dùng</th>
                      <th>Email</th>
                      <th>Vai trò</th>
                      <th>Trạng thái</th>
                      <th class="text-end"></th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr th:each="user : ${users}">
                      <td class="text-muted fw-bold" th:text="${'#' + user.id}">#1</td>
                      <td>
                        <div class="d-flex align-items-center">
                          <img th:src="${user.avatar != null ? user.avatar : 'https://ui-avatars.com/api/?name=' + user.firstName + '+' + user.lastName}"
                            alt="Avatar" class="rounded-circle me-3 border" width="40" height="40">
                          <div class="fw-bold" th:text="${user.username}">username123</div>
                        </div>
                      </td>
                      <td class="text-muted" th:text="${user.email}">user@example.com</td>
                      <td>
                        <span class="badge rounded-pill bg-info text-dark"
                          th:text="${user.role}">STUDENT</span>
                      </td>
                      <td>
                        <span class="badge rounded-pill bg-success" th:if="${user.active}">Hoạt động</span>
                        <span class="badge rounded-pill bg-danger" th:unless="${user.active}">Bị khóa</span>
                      </td>
                      <td class="text-end">
                        <div class="btn-group shadow-sm">
                          <button type="button" class="btn btn-sm btn-light text-warning btn-edit"
                            th:data-id="${user.id}"
                            th:data-username="${user.username}"
                            th:data-email="${user.email}"
                            th:data-firstname="${user.firstName}"
                            th:data-lastname="${user.lastName}"
                            th:data-role="${user.role}"
                            th:data-active="${user.active}"
                            th:data-verified="${user.verified}">
                            <i class="fa-solid fa-pen-to-square"></i>
                          </button>

                          <button type="button" class="btn btn-sm btn-light text-danger btn-delete"
                            th:data-id="${user.id}"
                            th:data-name="${user.username}"
                            th:data-url="@{'/users/delete/' + ${user.id}}">
                            <i class="fa-solid fa-trash-can"></i>
                          </button>
                        </div>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <footer th:replace="~{base :: footer}"></footer>


    <div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow">

          <div class="modal-header bg-primary text-white">
            <h5 class="modal-title" id="userModalTitle"></h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
              aria-label="Đóng"></button>
          </div>

          <div class="modal-body p-4">
            <form id="userForm" th:action="@{/users/update}" method="post" enctype="multipart/form-data">
              <input type="hidden" id="userId" name="id">

              <div class="row mb-3">
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Tên đăng nhập</label>
                  <input type="text" class="form-control bg-light" id="username" readonly>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Email</label>
                  <input type="email" class="form-control" id="email" name="email" required>
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Họ</label>
                  <input type="text" class="form-control" id="firstName" name="firstName">
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Tên</label>
                  <input type="text" class="form-control" id="lastName" name="lastName">
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Vai trò</label>
                  <select class="form-select" id="role" name="role">
                    <option value="STUDENT">Học viên</option>
                    <option value="TEACHER">Giảng viên</option>
                    <option value="ADMIN">Quản trị viên</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Ảnh đại diện (Avatar)</label>
                  <input type="file" class="form-control" id="avatar" name="avatar" accept="image/*">
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-md-6">
                  <div class="form-check form-switch mt-2">
                    <input class="form-check-input" type="checkbox" id="active" name="active">
                    <label class="form-check-label fw-semibold text-success" for="active">Active</label>
                  </div>
                </div>
                <div class="col-md-6" id="verifySection" style="display: none;">
                  <div class="form-check form-switch mt-2">
                    <input class="form-check-input" type="checkbox" id="verified" name="verified">
                    <label class="form-check-label fw-semibold text-primary" for="verified">Verified</label>
                  </div>
                </div>
              </div>
            </form>
          </div>

          <div class="modal-footer bg-light">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
            <button type="button" class="btn btn-primary" id="btnSaveUser">Lưu thông tin</button>
          </div>
        </div>
      </div>
    </div>

    <th:block th:replace="~{base :: generic_delete_modal}"></th:block>
    <th:block th:replace="~{base :: global_toast}"></th:block>

    <script th:src="@{/js/AdminUser.js}"></script>

    <th:block th:insert="~{:: page_scripts} ?: ~{}"></th:block>

  </body>
</html>
